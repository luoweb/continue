name: Auth Service CI/CD

env:
  DOCKER_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
  ALIYUN_TOKEN: ${{ secrets.ALIYUN_TOKEN }}

on:
  push:
    branches:
      - main
      - authserv
    paths:
      - 'auth-service/**'
  pull_request:
    paths:
      - 'auth-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/authserv')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.ALIYUN_USER }}
          password: ${{ env.ALIYUN_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/authserv') }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/roweb/continue-auth-service:latest
            ${{ env.DOCKER_REGISTRY }}/roweb/continue-auth-service:${{ github.sha }}
          build-args: |
            PYTHON_BASE_IMAGE=${{ secrets.PYTHON_BASE_IMAGE || 'python:3.11-slim' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/authserv')
        run: |
          cd auth-service
          docker run --rm \
            -e WORKOS_API_KEY=test \
            -e WORKOS_CLIENT_ID=test \
            ${{ env.DOCKER_REGISTRY }}/roweb/continue-auth-service:${{ github.sha }} \
            python -c "from main import app; print('Auth service loaded successfully')"

      - name: Health check
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/authserv')
        run: |
          docker run -d --name auth-test -p 8000:8000 \
            -e WORKOS_API_KEY=test \
            -e WORKOS_CLIENT_ID=test \
            ${{ env.DOCKER_REGISTRY }}/roweb/continue-auth-service:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop auth-test
          docker rm auth-test

      - name: Notify deployment
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/authserv')
        run: |
          echo "✅ Auth service image pushed to Aliyun ACR"
          echo "Image: ${{ env.DOCKER_REGISTRY }}/roweb/continue-auth-service:latest"