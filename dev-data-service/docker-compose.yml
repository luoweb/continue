version: "3.8"

services:
  dev-data-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowork-dev-data-service
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DB_TYPE=sqlite
      - DATABASE_PATH=/app/data/dev_data.db
      - REQUIRE_AUTH=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
