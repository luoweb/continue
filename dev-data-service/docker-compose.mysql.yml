version: "3.8"

services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/roweb/mysql:8.0
    container_name: cowork_dev_data_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cowork_dev_data
      MYSQL_USER: cowork
      MYSQL_PASSWORD: cowork_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  dev-data-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowork_dev_data_service
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=cowork
      - DB_PASSWORD=cowork_password
      - DB_NAME=cowork_dev_data
      - DB_CHARSET=utf8mb4
      - REQUIRE_AUTH=false
    depends_on:
      - mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
